services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-liftlytics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-liftlytics}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-liftlytics} -d ${POSTGRES_DB:-liftlytics}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-liftlytics}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-liftlytics}?schema=public
      BASIC_AUTH_USERNAME: ${BASIC_AUTH_USERNAME:?BASIC_AUTH_USERNAME is required}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:?BASIC_AUTH_PASSWORD is required}
      BASIC_AUTH_USERNAME_2: ${BASIC_AUTH_USERNAME_2:-}
      BASIC_AUTH_PASSWORD_2: ${BASIC_AUTH_PASSWORD_2:-}
      BASIC_AUTH_USERNAME_3: ${BASIC_AUTH_USERNAME_3:-}
      BASIC_AUTH_PASSWORD_3: ${BASIC_AUTH_PASSWORD_3:-}
      BASIC_AUTH_USERNAME_4: ${BASIC_AUTH_USERNAME_4:-}
      BASIC_AUTH_PASSWORD_4: ${BASIC_AUTH_PASSWORD_4:-}
      NEXT_TELEMETRY_DISABLED: "1"
    command: ["sh", "-c", "./node_modules/.bin/prisma migrate deploy && npm run start"]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
